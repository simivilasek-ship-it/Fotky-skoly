<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje fotogalerie</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Lightbox -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/css/lightbox.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --crimson: rgb(125, 0, 0);
      --crimson-dark: rgb(90, 0, 0);
      --cream: #fdf6ec;
      --ink: #1a1410;
      --muted: #7a6f65;
      --border: #e8ddd0;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise efekt */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: auto;
      padding: 60px 24px 80px;
    }

    /* HEADER */
    header {
      margin-bottom: 60px;
      border-left: 5px solid var(--crimson);
      padding-left: 24px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--crimson);
      margin-bottom: 10px;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp .6s ease forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.2rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp .6s ease forwards .15s;
    }

    h1 span {
      color: var(--crimson);
    }

    header p:last-child {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp .6s ease forwards .3s;
    }

    /* GRID */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 700px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
    }

    /* KARTA */
    figure {
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      opacity: 0;
      animation: fadeUp .6s ease forwards;
      transition: transform .3s ease;
    }

    figure:hover {
      transform: translateY(-4px);
    }

    figure:nth-child(1) { animation-delay: .35s; }
    figure:nth-child(2) { animation-delay: .42s; }
    figure:nth-child(3) { animation-delay: .49s; }
    figure:nth-child(4) { animation-delay: .56s; }
    figure:nth-child(5) { animation-delay: .63s; }
    figure:nth-child(6) { animation-delay: .70s; }
    figure:nth-child(7) { animation-delay: .77s; }
    figure:nth-child(8) { animation-delay: .84s; }

    figure a {
      position: relative;
      display: block;
      overflow: hidden;
    }

    figure img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }

    figure:hover img {
      transform: scale(1.08);
    }

    /* Overlay */
    figure a::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 45%,
        rgba(125,0,0,.55)
      );
      opacity: 0;
      transition: opacity .3s ease;
    }

    figure:hover a::after {
      opacity: 1;
    }

    /* Ikona */
    figure a::before {
      content: '⊕';
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
      color: white;
      opacity: 0;
      transform: scale(.7);
      transition: .3s ease;
    }

    figure:hover a::before {
      opacity: 1;
      transform: scale(1);
    }

    /* Popisek */
    figcaption {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 500;
      transition: color .25s ease;
    }

    figure:hover figcaption {
      color: var(--crimson);
    }

    /* FOOTER */
    .gallery-footer {
      margin-top: 60px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .gallery-footer span {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--crimson);
      display: inline-block;
    }

    /* ANIMACE */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* LIGHTBOX */
    .lb-data .lb-caption {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    .lb-nav a.lb-prev,
    .lb-nav a.lb-next {
      opacity: .7;
    }

    .lb-nav a.lb-prev:hover,
    .lb-nav a.lb-next:hover {
      opacity: 1;
    }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      :root {
        --cream: #25201b;
        --ink: #f4efe9;
        --muted: #b0a397;
        --border: #3d352d;
      }

      figure {
        background: #2e2823;
      }

      figcaption {
        background: #2e2823;
      }
    }

    /* REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    /* PRINT */
    @media print {
      body::before {
        display: none;
      }

      .gallery-footer {
        display: none;
      }

      figure a::before,
      figure a::after {
        display: none;
      }
    }
  </style>
</head>

<body>

    <header>

  </main>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!-- Lightbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/js/lightbox.min.js"></script>

  <script>
    lightbox.option({
      albumLabel: "Obrázek %1 z %2",
      wrapAround: true,
